<main class="custom-card card_front">
  <section>
    <span>Write the sentence you hear.</span>
    <span class="target_word">{{word}}</span>
  </section>

  <section class="audio">
    <div class="audio_word">{{word_audio}}</div>
    <div class="audio_pause">{{pause}}</div>
    <div class="audio_sentence">{{sentence_audio}}</div>
  </section>

  <div class="target_sentence">{{type:sentence}}</div>
</main>
