<div class="flashcard front-flashcard">
  <!-- <header class="header">
    <h1 class="header__title">4000 Essential English Words</h1>
  </header> -->

  <!-- <h1 id="rubric">
    4000 <br />
    Essential English <br />
    Words
  </h1> -->

  <main class="main glass">
    <section class="main__word">
      <h2 class="word">{{Word}}</h2>
      <div class="word-sound">{{Sound}}</div>
    </section>
    <section class="main__ipa">
      <h3 class="ipa">{{IPA}}</h3>
    </section>
  </main>

  <details class="details glass">
    <summary>Meaning</summary>
    {{Meaning/Translation}}
  </details>

  {{#SimilarWord}}
  <div class="panel glass">
    <div class="similar-reveal">
      <p class="similar-word">{{SimilarWord}}</p>
      <p class="similar-meaning">{{SimilarMeaning}}</p>
    </div>
  </div>
  {{/SimilarWord}}

  <script>
    const unorderedList = document.querySelector('ul');
    const items = document.querySelectorAll('li');

    if (
      items.length > 6 &&
      items.length < 18 &&
      items.length !== 12
    ) {
      unorderedList.style.justifyContent = 'start';
    }

    document.addEventListener('click', ({ target }) => {
      const reveal = target.closest('.similar-reveal');

      if (!reveal) return;

      reveal.classList.toggle('show');
    });
  </script>
</div>
